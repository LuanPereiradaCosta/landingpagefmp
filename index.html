<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poco Loco</title>
    <!-- preconnect serve para abrir com antecedencia as fontes e não demorar para carregar no site-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <!--crossororigin para pegar de outra fonte(google) e o nosso site entender que não é algo malicioso-->
    <!-- importando fontes de fora do vs code-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Titan+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"> <!--link dos icones de apps-->
</head>
<body>
    <!-- aonde cria a cabeça do site -->
    <header id="cabecalho">
        <div class="container-header"> <!--posicionamento logo-->
            <div class="brand-group">
                <a href="#inicio"> <!--referencia o cabeçalho para quando clicar no logo--> 
                    <img src="assets/logo/logo_poco.png" alt="Logo Poco Loco">
                    <span class="brand-name">Poco Loco</span>
                </a>
            </div>
            <!-- class para colocar o estilo, cor e posicionamento -->
            <nav class="menu-navegacao"> <!-- nav para poder colocar referencias para navegação--> 
                <ul> <!-- para criar uma lista referenciando as sessoes-->
                    <li><a href="#historia">História</a></li> <!-- posição da lista-->
                    <li><a href="#inspiracao">Inspiração</a></li> <!-- a # é para procurar por um ID-->
                    <li><a href="#nossa-casa">Nossa Casa</a></li>
                    <li><a href="#menu">Menu</a></li>
                    <li><a href="#contato">Contato</a></li>
                </ul>
            </nav>
            <div class="contato-header">
                <a href="#contato" class="icon-link link-instagram">
                    <i class="fa-brands fa-instagram"></i> <!--classe puxada da biblioteca <i> para colocar icone--> 
                </a>
                <a href="#contato" class="icon-link link-whatsapp">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
                <a href="#contato" class="icon-link link-localizacao">
                    <i class="fa-solid fa-location-dot"></i>
                </a>

            </div>
        </div>
    </header>

    <main> <!-- aqui cria corpo (parte principal) do site -->
        
        <!-- sessões aonde bota o tema de cada -->
        <section id="inicio" class="bloco">
            <div class="slideshow">
                <div class="slide slide1"></div>
                <div class="slide slide2"></div>
                <div class="slide slide3"></div>
                <div class="slide slide4"></div>
                <div class="slide slide5"></div>
            </div>
            <div class="hero-overlay"></div>
            <div class="container-hero">
                <h1>Poco Loco</h1>
                <p>O sabor verdadeiro do méxico!</p>
                <a href="#menu" class="btn-primary">Menu</a>
            </div>

            </section> 
        <section id="historia" class="bloco">
            </section>

        <section id="inspiracao" class="bloco">
            </section>

        <section id="nossa-casa" class="bloco">
            </section>

        <section id="menu" class="bloco">
            </section>
    </main>

    <footer id="contato">
        </footer>

</body>
</html>
